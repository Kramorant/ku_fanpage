<section class="events-page">
  <div class="page-hero">
    <h1 class="page-title">EVENTS</h1>
    <p class="page-subtitle">In-game events and special missions</p>
  </div>
  <div class="events-grid" *ngIf="events.length > 0; else noEvents">
    <article class="event-card" *ngFor="let event of events">
      <div class="event-card-accent"></div>
      <h2>{{ event.title }}</h2>
      <p>{{ event.description }}</p>
    </article>
  </div>
  <ng-template #noEvents>
    <div class="coming-soon">
      <span class="coming-soon-icon">📅</span>
      <h2>No Events Yet</h2>
      <p>Check back soon for upcoming in-game events and special missions.</p>
    </div>
  </ng-template>
</section>

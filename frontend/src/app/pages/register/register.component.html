<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-logo">KU</span>
      <h1>Create Account</h1>
      <p>Join the Kaiju Universe community</p>
    </div>
    <form class="register-form" (ngSubmit)="submit()">
      <label for="name">Name</label>
      <input id="name" type="text" name="name" [(ngModel)]="name" placeholder="Your name" required />
      <label for="email">Email</label>
      <input id="email" type="email" name="email" [(ngModel)]="email" placeholder="your@email.com" required />
      <label for="password">Password</label>
      <input id="password" type="password" name="password" [(ngModel)]="password" placeholder="••••••••" required />
      <button type="submit">Create Account</button>
    </form>
    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Sign in</a></p>
    </div>
  </div>
</div>
